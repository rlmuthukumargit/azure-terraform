trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: terraform-secrets # Variable Group containing SYNAPSE_ADMIN_PASSWORD
- name: TF_VAR_synapse_admin_password
  value: $(SYNAPSE_ADMIN_PASSWORD)

stages:
- stage: TerraformPlan
  displayName: 'Terraform Plan'
  jobs:
  - job: Plan
    displayName: 'Plan changes'
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: AzureCLI@2
      displayName: 'Terraform Init & Plan'
      inputs:
        azureSubscription: 'azure-service-connection'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          terraform init \
            -backend-config="resource_group_name=terraform-mgmt-rg" \
            -backend-config="storage_account_name=tfstatesharedsa" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=dev.terraform.tfstate"
          
          terraform plan -var-file="environments/dev.tfvars" -out=tfplan

- stage: TerraformApply
  displayName: 'Terraform Apply'
  dependsOn: TerraformPlan
  condition: succeeded()
  jobs:
  - deployment: Apply
    displayName: 'Apply changes'
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - task: AzureCLI@2
            displayName: 'Terraform Init & Apply'
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                terraform init \
                  -backend-config="resource_group_name=terraform-mgmt-rg" \
                  -backend-config="storage_account_name=tfstatesharedsa" \
                  -backend-config="container_name=tfstate" \
                  -backend-config="key=dev.terraform.tfstate"
                
                terraform apply -var-file="environments/dev.tfvars" -auto-approve
