trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: terraform-secrets # Variable Group containing SYNAPSE_ADMIN_PASSWORD
- name: TF_VAR_synapse_admin_password
  value: $(SYNAPSE_ADMIN_PASSWORD)

stages:
- stage: TerraformPlan
  displayName: 'Terraform Plan'
  jobs:
  - job: Plan
    displayName: 'Plan changes'
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'terraform-mgmt-rg'
        backendAzureRmStorageAccountName: 'tfstatesharedsa'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: 'Terraform Plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file="environments/dev.tfvars"'

- stage: TerraformApply
  displayName: 'Terraform Apply'
  dependsOn: TerraformPlan
  condition: succeeded()
  jobs:
  - deployment: Apply
    displayName: 'Apply changes'
    environment: 'dev' # Use DevOps Environment for approval gates
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'azure-service-connection'
              backendAzureRmResourceGroupName: 'terraform-mgmt-rg'
              backendAzureRmStorageAccountName: 'tfstatesharedsa'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'dev.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'azure-service-connection'
              commandOptions: '-var-file="environments/dev.tfvars" -auto-approve'
