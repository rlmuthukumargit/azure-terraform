parameters:
- name: environment
  displayName: 'Environment'
  type: string
  default: 'dev'
  values:
  - dev
  - qa
  - prod

trigger:
- main
- qa

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: synapse-variable-group-terraform
- name: azureSubscription
  value: 'tss_d365_devops_dev_01'
- name: terraformVersion
  value: '1.9.0'
- name: planFileName
  value: 'tfplan-${{ parameters.environment }}'

stages:
- stage: Plan
  displayName: 'Terraform Plan'
  jobs:
  - job: Plan
    displayName: 'Plan changes'
    steps:
    - checkout: self

    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: 'Terraform Init & Plan'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          set -e
          export TF_VAR_sql_password="$(SYNAPSE_ADMIN_PASSWORD)"
          export TF_VAR_sql_administrator_login="$(SQL_ADMIN_USERNAME)"
          
          terraform init \
            -backend-config="environments/${{ parameters.environment }}/${{ parameters.environment =.backend"
          
          terraform validate
          
          terraform plan \
            -lock-timeout=120s \
            -var-file="environments/${{ parameters.environment }}/${{ parameters.environment }}.tfvars" \
            -out=$(planFileName)

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Terraform Plan'
      inputs:
        targetPath: '$(System.DefaultWorkingDirectory)/$(planFileName)'
        artifact: $(planFileName)
        publishLocation: 'pipeline'

- stage: Apply
  displayName: 'Terraform Apply'
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: Apply
    displayName: 'Apply changes'
    steps:
    - checkout: self

    - download: current
      artifact: $(planFileName)
      displayName: 'Download Terraform Plan'

    - task: ms-devlabs.custom-terraform-tasks.custom-terraform-installer-task.TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: $(terraformVersion)

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          set -e
          export TF_VAR_sql_password="$(SYNAPSE_ADMIN_PASSWORD)"
          export TF_VAR_sql_administrator_login="$(SQL_ADMIN_USERNAME)"
          
          terraform init \
            -backend-config="environments/${{ parameters.environment }}/${{ parameters.environment }}.backend"
          
          terraform apply \
            -lock-timeout=120s \
            -auto-approve $(Pipeline.Workspace)/$(planFileName)/$(planFileName)
